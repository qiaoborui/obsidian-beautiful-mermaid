<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1042.687 214.25" width="1042.687" height="214.25" style="--bg:#f7f7f8;--fg:#16171d;--line:#a4a4ad;--accent:#8b7bd8;--muted:#7c7d85;--surface:#ece9f8;--border:#d8d8df">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="source" data-to="render" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="199.769,90.9 247.769,90.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="render" data-to="theme" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="450.51599999999996,90.9 498.51599999999996,90.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="theme" data-to="reading" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="650.134,90.9 674.134,90.9 674.134,58.45 698.134,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="theme" data-to="live" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="650.134,90.9 674.134,90.9 674.134,123.35000000000001 698.134,123.35000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="live" data-to="zoom" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="817.889,123.35000000000001 841.889,123.35000000000001 841.889,90.9 865.889,90.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="live" data-to="mobile" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="817.889,123.35000000000001 841.889,123.35000000000001 841.889,155.8 865.889,155.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="source" data-label="Mermaid code block" data-shape="rectangle">
  <rect x="40" y="72.45" width="159.769" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="119.8845" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Mermaid code block</text>
</g>
<g class="node" data-id="render" data-label="Beautiful Mermaid renderer" data-shape="rectangle">
  <rect x="247.769" y="72.45" width="202.74699999999999" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="349.1425" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Beautiful Mermaid renderer</text>
</g>
<g class="node" data-id="theme" data-label="Theme-aware SVG" data-shape="rectangle">
  <rect x="498.51599999999996" y="72.45" width="151.618" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="574.3249999999999" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Theme-aware SVG</text>
</g>
<g class="node" data-id="reading" data-label="Reading view" data-shape="rectangle">
  <rect x="698.134" y="40" width="119.755" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="758.0115000000001" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Reading view</text>
</g>
<g class="node" data-id="live" data-label="Live Preview" data-shape="rectangle">
  <rect x="698.134" y="104.9" width="119.75499999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="758.0115" y="123.35000000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Live Preview</text>
</g>
<g class="node" data-id="zoom" data-label="Zoom and pan" data-shape="rectangle">
  <rect x="865.889" y="72.45" width="123.46" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="927.619" y="90.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Zoom and pan</text>
</g>
<g class="node" data-id="mobile" data-label="Mobile gestures" data-shape="rectangle">
  <rect x="865.889" y="137.35000000000002" width="136.798" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="934.288" y="155.8" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Mobile gestures</text>
</g>
</svg>